openapi: 3.0.3

info:
  title: FisioFlow API
  version: 1.0.0
  description: API para gerenciamento de pacientes e agendamentos de fisioterapia

servers:
  - url: http://localhost:3000

tags:
  - name: Patients
  - name: Appointments

paths:

  /patients:

    post:
      tags: [Patients]
      summary: Criar paciente
      description: |
        Cria um novo paciente seguindo as regras de validação:

        - Nome é obrigatório
        - Nome deve conter apenas caracteres alfabéticos
        - Idade deve estar entre 1 e 120
        - Telefone deve seguir o formato (XX) XXXXX-XXXX
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Paciente criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          description: Dados do paciente inválidos
          content:
            application/json:
              example:
                message: "Invalid patient data"

    get:
      tags: [Patients]
      summary: Listar pacientes
      responses:
        '200':
          description: Pacientes listados com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'

  /patients/{id}:

    patch:
      tags: [Patients]
      summary: Atualizar paciente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Paciente atualizado com sucesso
        '400':
          description: Dados inválidos
        '404':
          description: Paciente não encontrado

    delete:
      tags: [Patients]
      summary: Deletar paciente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Paciente deletado com sucesso
        '404':
          description: Paciente não encontrado

  /appointments:

    post:
      tags: [Appointments]
      summary: Criar agendamento
      description: |
        Cria um novo agendamento seguindo as regras de negócio:

        - O paciente deve existir
        - A duração deve ser maior que zero
        - O horário deve seguir o formato HH:MM
        - Agendamentos não podem se sobrepor no mesmo dia
        - Agendamentos não podem ser criados em datas passadas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Agendamento criado com sucesso

        '400':
          description: Dados do agendamento inválidos
          content:
            application/json:
              examples:
                invalidTime:
                  value:
                    message: "Invalid time format. Use HH:MM"
                invalidDuration:
                  value:
                    message: "Duration must be greater than zero"
                missingFields:
                  value:
                    message: "patientId, date, startTime and duration are required"
                invalidPastDate:
                  value:
                    message: "Past dates are not allowed"

        '404':
          description: Paciente não encontrado
          content:
            application/json:
              example:
                message: "Patient not found"

        '409':
          description: Conflito de horário detectado
          content:
            application/json:
              example:
                message: "Schedule conflict detected"

    get:
      tags: [Appointments]
      summary: Listar agendamentos
      responses:
        '200':
          description: Agendamentos listados com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

  /appointments/day/{date}:

    get:
      tags: [Appointments]
      summary: Buscar agendamentos por data
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            example: "2026-04-24"
            description: "Formato ISO (YYYY-MM-DD)"
      responses:
        '200':
          description: Agendamentos retornados com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Appointment'

components:

  schemas:

    CreatePatientRequest:
      type: object
      required: [name, age]
      properties:
        name:
          type: string
          pattern: "^[A-Za-zÀ-ÿ\\s]+$"
          example: Maria Souza
        phone:
          type: string
          example: "(85) 99999-0000"
        age:
          type: integer
          example: 35
        diagnosis:
          type: string

    UpdatePatientRequest:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer

    Patient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    CreateAppointmentRequest:
      type: object
      required: [patientId, date, startTime, duration]
      properties:
        patientId:
          type: integer
        date:
          type: string
          example: "2026-04-24"
          description: "Formato ISO (YYYY-MM-DD)"
        startTime:
          type: string
          example: "08:00"
        duration:
          type: integer
          example: 60

    Appointment:
      type: object
      properties:
        id:
          type: integer
        patientId:
          type: integer
        date:
          type: string
        startTime:
          type: string
        duration:
          type: integer
        endTime:
          type: string
        createdAt:
          type: string